<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Event Timer — Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Event Timer">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: max(16px, env(safe-area-inset-top)) 16px 24px;
      user-select: none;
      -webkit-user-select: none;
      overflow-x: hidden;
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 8px;
    }
    header h1 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #484f58;
      display: flex;
      align-items: center;
    }
    .header-btns { display: flex; gap: 6px; }
    .hbtn {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 7px;
      color: #c9d1d9;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .hbtn:hover { border-color: #388bfd; color: #388bfd; }
    .hbtn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: #161b22;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 16px;
    }
    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #484f58;
      transition: background 0.15s, color 0.15s;
    }
    .tab.active { background: #21262d; color: #f0f6fc; }

    /* Timer input */
    .timer-wrap { text-align: center; margin: 12px 0 8px; }
    #timerInput {
      font-size: 68px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #f0f6fc;
      width: 100%;
      text-align: center;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      padding-bottom: 4px;
    }
    #timerInput:focus { border-bottom-color: #388bfd; color: #388bfd; cursor: text; }
    .timer-hint { font-size: 11px; color: #484f58; text-align: center; margin-bottom: 10px; }

    /* Controls */
    .controls { display: flex; gap: 8px; margin: 12px 0; }
    .btn {
      flex: 1;
      padding: 15px 6px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      transition: transform 0.1s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.93); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-play  { background: #238636; color: #fff; }
    .btn-pause { background: #9e6a03; color: #fff; }
    .btn-stop  { background: #da3633; color: #fff; }
    .btn-reset { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

    /* Quick adjust */
    .adjust { display: flex; gap: 8px; margin: 0 0 12px; }
    .adjust .btn-sm { flex: 1; padding: 9px 6px; }

    /* Section */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #484f58; margin-bottom: 8px;
    }

    /* Presets */
    .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
    .preset-chip {
      display: flex; align-items: center;
      background: #161b22; border: 1px solid #30363d; border-radius: 20px;
      padding: 6px 8px 6px 12px; font-size: 13px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; gap: 2px;
    }
    .preset-chip:hover { background: #21262d; border-color: #388bfd; }
    .preset-chip .del-btn {
      background: none; border: none; cursor: pointer; padding: 0 2px;
      color: #da3633; font-size: 16px; line-height: 1; opacity: 0.7;
    }
    .preset-chip .del-btn:hover { opacity: 1; }

    .preset-add { display: flex; gap: 6px; margin-bottom: 14px; }
    .preset-add input {
      flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; padding: 9px 10px; font-size: 13px; outline: none;
      transition: border-color 0.15s;
    }
    .preset-add input:focus { border-color: #388bfd; }

    .btn-sm {
      padding: 9px 12px; border: 1px solid #30363d; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600;
      background: #21262d; color: #c9d1d9;
      transition: border-color 0.15s, color 0.15s; white-space: nowrap;
    }
    .btn-sm:hover { border-color: #388bfd; color: #388bfd; }
    .btn-sm.primary { background: #388bfd; border-color: #388bfd; color: #fff; }
    .btn-sm.primary:hover { background: #1f6feb; border-color: #1f6feb; }
    .fast-btn.active { background: #8957e5; border-color: #8957e5; color: #fff; }
    .fast-btn.active:hover { background: #6e40c9; border-color: #6e40c9; color: #fff; }

    /* Thresholds */
    .thresholds { display: flex; gap: 12px; margin-bottom: 14px; }
    .threshold { flex: 1; }
    .threshold label { font-size: 11px; color: #484f58; display: block; margin-bottom: 4px; }
    .threshold input {
      width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; padding: 9px 8px; font-size: 15px; text-align: center; outline: none;
      transition: border-color 0.15s;
    }
    .threshold input:focus { border-color: #388bfd; }

    hr { border: none; border-top: 1px solid #21262d; margin: 14px 0; }

    /* Message */
    .message-area textarea {
      width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; padding: 10px; font-size: 14px; outline: none; resize: none;
      height: 62px; margin-bottom: 8px; font-family: inherit; transition: border-color 0.15s;
    }
    .message-area textarea:focus { border-color: #388bfd; }
    .message-area textarea::placeholder { color: #484f58; }
    .message-btns { display: flex; gap: 6px; }

    /* Clock section */
    .clock-section { text-align: center; padding: 24px 0 12px; }
    .clock-preview {
      font-size: 48px; font-weight: 700; color: #f0f6fc;
      font-variant-numeric: tabular-nums; margin-bottom: 10px;
    }
    .section-hint { font-size: 13px; color: #484f58; line-height: 1.5; }

    /* Logo section */
    .logo-section { text-align: center; padding: 16px 0 12px; }
    .logo-section .pick-btn {
      padding: 16px 24px; background: #21262d; border: 1px dashed #30363d; border-radius: 10px;
      color: #c9d1d9; font-size: 14px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; width: 100%; margin-bottom: 12px;
    }
    .logo-section .pick-btn:hover { background: #161b22; border-color: #388bfd; }
    #logoPreview {
      max-width: 100%; max-height: 130px; object-fit: contain; border-radius: 6px;
      display: none; margin: 0 auto;
    }
    #logoFilename { font-size: 12px; color: #388bfd; margin-top: 6px; display: none; word-break: break-all; }
    #logoFile { display: none; }

    /* Running indicator */
    .running-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #238636; margin-left: 6px; opacity: 0; transition: opacity 0.3s;
    }
    .running-dot.active { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>Event Timer <span class="running-dot" id="runningDot"></span></h1>
  <div class="header-btns">
    <button class="hbtn" id="btnWake" title="Mantener pantalla encendida">☀ Despierto</button>
    <button class="hbtn" id="btnOpenDisplay" title="Abrir la pantalla del timer">⧉ Display</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-mode="timer">⏱ Timer</div>
  <div class="tab" data-mode="clock">🕐 Hora</div>
  <div class="tab" data-mode="logo">🖼 Logo</div>
</div>

<!-- TIMER SECTION -->
<div id="section-timer">
  <div class="timer-wrap">
    <input class="timer-input" id="timerInput" value="25:00" maxlength="5" spellcheck="false"
           inputmode="numeric" autocomplete="off">
  </div>
  <p class="timer-hint">Toca para editar · formato MM:SS</p>

  <div class="controls">
    <button class="btn btn-play" id="btnPlay">▶</button>
    <button class="btn btn-stop" id="btnStop">■</button>
    <button class="btn btn-reset" id="btnReset">↺</button>
  </div>

  <div class="adjust">
    <button class="btn-sm" data-adj="-60">−1 min</button>
    <button class="btn-sm" data-adj="60">+1 min</button>
    <button class="btn-sm fast-btn" id="btnFast" title="Modo rápido x1.1">⚡</button>
  </div>

  <div class="section-label">Presets</div>
  <div class="presets" id="presetList"></div>
  <div class="preset-add">
    <input type="text" id="presetName" placeholder="Nombre del preset..." autocomplete="off">
    <button class="btn-sm" id="btnSavePreset">+ Guardar</button>
  </div>

  <div class="section-label">Alertas (minutos restantes)</div>
  <div class="thresholds">
    <div class="threshold">
      <label>⚠️ Aviso</label>
      <input type="number" id="warnMin" value="5" min="0" max="999">
    </div>
    <div class="threshold">
      <label>🔴 Urgente</label>
      <input type="number" id="urgentMin" value="2" min="0" max="999">
    </div>
  </div>
</div>

<!-- CLOCK SECTION -->
<div id="section-clock" style="display:none">
  <div class="clock-section">
    <div class="clock-preview" id="clockPreview">00:00:00</div>
    <p class="section-hint">La pantalla de display mostrará<br>la hora actual del sistema en tiempo real.</p>
  </div>
</div>

<!-- LOGO SECTION -->
<div id="section-logo" style="display:none">
  <div class="logo-section">
    <button class="pick-btn" id="btnPickLogo">📂 &nbsp;Seleccionar imagen…<br><span style="font-size:11px;color:#484f58">JPG · PNG · SVG · GIF · WebP</span></button>
    <input type="file" id="logoFile" accept="image/png,image/jpeg,image/gif,image/svg+xml,image/webp">
    <img id="logoPreview" alt="logo preview">
    <div id="logoFilename"></div>
  </div>
</div>

<hr>

<!-- MESSAGE -->
<div class="message-area">
  <div class="section-label">Mensaje a pantalla</div>
  <textarea id="messageInput" placeholder="Escribe un mensaje para mostrar en el display…"></textarea>
  <div class="message-btns">
    <button class="btn-sm primary" id="btnSendMsg">Enviar</button>
    <button class="btn-sm" id="btnClearMsg">Limpiar</button>
  </div>
</div>

<script src="common.js"></script>
<script>
const bus   = ET.makeBus();
const model = new ET.TimerModel();

let mode       = 'timer';
let logoVer    = 0;
let clockTimer = null;
let runLoop    = null;
let lastSec    = null;

const $ = id => document.getElementById(id);
const timerInput = $('timerInput');

// ── Settings persistence ─────────────────────────────────────────────────────
function restoreSettings() {
  const s = ET.loadJSON(ET.KEY_SETTINGS, null);
  if (!s) return;
  if (s.warn   != null) $('warnMin').value   = s.warn;
  if (s.urgent != null) $('urgentMin').value = s.urgent;
  if (s.time) { model.setTime(ET.parse(s.time)); timerInput.value = ET.fmt(model.timeLeft); }
}
function saveSettings() {
  ET.saveJSON(ET.KEY_SETTINGS, {
    warn: $('warnMin').value, urgent: $('urgentMin').value,
    time: ET.fmt(model.totalSecs)
  });
}

function thresholds() {
  return {
    warn:   Math.max(0, parseInt($('warnMin').value   || 5)) * 60,
    urgent: Math.max(0, parseInt($('urgentMin').value || 2)) * 60,
  };
}

// ── Emit state to display(s) ─────────────────────────────────────────────────
function emit() {
  const { warn, urgent } = thresholds();
  const state = {
    type: 'state', mode,
    running: model.running,
    endAt: model.endAt,
    speed: model.speed,
    timeLeft: model.remaining(),
    totalSecs: model.totalSecs,
    warn, urgent, logoVer,
    hasLogo: !!ET.Logo.get(),
    message: $('messageInput').value.trim()
  };
  bus.post(state);
  ET.saveJSON(ET.KEY_STATE, state);
  saveSettings();
}

// ── Run UI ───────────────────────────────────────────────────────────────────
function setRunUI(running) {
  const play = $('btnPlay');
  play.textContent = running ? '⏸' : '▶';
  play.className   = running ? 'btn btn-pause' : 'btn btn-play';
  $('runningDot').classList.toggle('active', running);
}

// ── Timer loop (timestamp-driven) ────────────────────────────────────────────
function startLoop() {
  stopLoop();
  runLoop = setInterval(() => {
    const r = model.remaining();
    timerInput.value = ET.fmt(r);
    if (r !== lastSec) { lastSec = r; emit(); }
    if (r <= 0) { model.pause(); setRunUI(false); stopLoop(); releaseWake(); emit(); }
  }, 200);
}
function stopLoop() { if (runLoop) { clearInterval(runLoop); runLoop = null; } }

function play() {
  model.start();
  setRunUI(true);
  acquireWake();
  lastSec = null;
  startLoop();
  emit();
}
function pause() {
  model.pause();
  setRunUI(false);
  stopLoop();
  releaseWake();
  timerInput.value = ET.fmt(model.timeLeft);
  emit();
}
function stopAll() {
  model.pause();
  setRunUI(false);
  stopLoop();
  releaseWake();
  timerInput.value = ET.fmt(model.timeLeft);
}

// ── Mode tabs ────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    mode = tab.dataset.mode;
    ['timer', 'clock', 'logo'].forEach(m => {
      $(`section-${m}`).style.display = (m === mode) ? 'block' : 'none';
    });
    stopAll();
    if (mode === 'clock') startClockPreview(); else stopClockPreview();
    emit();
  });
});

// ── Clock preview ────────────────────────────────────────────────────────────
function startClockPreview() {
  updateClockPreview();
  clockTimer = setInterval(updateClockPreview, 500);
}
function stopClockPreview() { clearInterval(clockTimer); clockTimer = null; }
function updateClockPreview() { $('clockPreview').textContent = ET.clockStr(); }

// ── Timer input ──────────────────────────────────────────────────────────────
timerInput.addEventListener('focus', () => { if (model.running) pause(); });
timerInput.addEventListener('blur', () => {
  model.setTime(ET.parse(timerInput.value));
  timerInput.value = ET.fmt(model.timeLeft);
  emit();
});
timerInput.addEventListener('keydown', e => { if (e.key === 'Enter') timerInput.blur(); });

// ── Controls ─────────────────────────────────────────────────────────────────
$('btnPlay').addEventListener('click', () => { if (model.running) pause(); else play(); });
$('btnStop').addEventListener('click', () => { stopAll(); emit(); });
$('btnReset').addEventListener('click', () => {
  stopAll();
  model.reset();
  timerInput.value = ET.fmt(model.timeLeft);
  emit();
});

// ── Quick adjust ─────────────────────────────────────────────────────────────
document.querySelectorAll('[data-adj]').forEach(b => {
  b.addEventListener('click', () => {
    const delta = parseInt(b.dataset.adj, 10);
    if (model.running) {
      model.endAt += Math.round(delta / model.speed * 1000);
      const r = model.remaining();
      timerInput.value = ET.fmt(r);
    } else {
      model.timeLeft = Math.max(0, model.timeLeft + delta);
      model.totalSecs = Math.max(0, model.totalSecs + delta);
      timerInput.value = ET.fmt(model.timeLeft);
    }
    lastSec = null;
    emit();
  });
});

// ── Fast mode (x1.1) ─────────────────────────────────────────────────────────
// Runs the countdown 10% faster (re-anchors mid-run so it never jumps). Handy
// when a speaker is overrunning. Session-only: resets to normal on reload.
let fastMode = false;
$('btnFast').addEventListener('click', () => {
  fastMode = !fastMode;
  $('btnFast').classList.toggle('active', fastMode);
  model.setSpeed(fastMode ? 1.1 : 1.0);
  lastSec = null;
  emit();
});

// ── Presets ──────────────────────────────────────────────────────────────────
function renderPresets() {
  const list = $('presetList');
  const presets = ET.Presets.all();
  list.innerHTML = '';
  if (!presets.length) {
    list.innerHTML = '<span style="font-size:12px;color:#484f58">Sin presets guardados</span>';
    return;
  }
  presets.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'preset-chip';
    const label = document.createElement('span');
    label.textContent = `${p.name} (${p.time})`;
    label.style.cursor = 'pointer';
    label.addEventListener('click', () => {
      stopAll();
      model.setTime(ET.parse(p.time));
      timerInput.value = ET.fmt(model.timeLeft);
      emit();
    });
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.textContent = '×';
    delBtn.title = 'Eliminar preset';
    delBtn.addEventListener('click', e => { e.stopPropagation(); ET.Presets.remove(p.name); renderPresets(); });
    chip.appendChild(label);
    chip.appendChild(delBtn);
    list.appendChild(chip);
  });
}
$('btnSavePreset').addEventListener('click', () => {
  const name = $('presetName').value.trim();
  if (!name) return;
  ET.Presets.save(name, ET.fmt(model.totalSecs));
  renderPresets();
  $('presetName').value = '';
});

// ── Logo ─────────────────────────────────────────────────────────────────────
$('btnPickLogo').addEventListener('click', () => $('logoFile').click());
$('logoFile').addEventListener('change', e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    ET.Logo.set(dataUrl);
    logoVer = Date.now();
    const preview = $('logoPreview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    $('logoFilename').style.display = 'block';
    $('logoFilename').textContent = file.name;
    bus.post({ type: 'logo', dataUrl, logoVer });
    emit();
  };
  reader.readAsDataURL(file);
});

// ── Message ──────────────────────────────────────────────────────────────────
$('btnSendMsg').addEventListener('click', emit);
$('btnClearMsg').addEventListener('click', () => { $('messageInput').value = ''; emit(); });

// ── Thresholds ───────────────────────────────────────────────────────────────
$('warnMin').addEventListener('change', emit);
$('urgentMin').addEventListener('change', emit);

// ── Wake Lock ────────────────────────────────────────────────────────────────
let wakeLock = null, wakeWanted = false;
async function acquireWake() {
  wakeWanted = true;
  $('btnWake').classList.add('active');
  try {
    if ('wakeLock' in navigator && !wakeLock) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) { /* denied or unsupported */ }
}
async function releaseWake() {
  wakeWanted = false;
  $('btnWake').classList.remove('active');
  try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch (e) {}
}
$('btnWake').addEventListener('click', () => { if (wakeWanted) releaseWake(); else acquireWake(); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && wakeWanted && !wakeLock) acquireWake();
});

// ── Open display ─────────────────────────────────────────────────────────────
// Open as a separate, draggable popup window (NOT a tab) by passing a size, so
// it can be moved onto a second screen. The Display's ⛶ button then toggles
// real fullscreen on whichever screen it sits, and back to this floating window.
$('btnOpenDisplay').addEventListener('click', () => {
  const W = 960, H = 540;
  const feats = `popup=yes,width=${W},height=${H},left=140,top=140,menubar=no,toolbar=no,location=no,status=no`;
  const win = window.open('display.html', 'et-display', feats);
  if (win) { try { win.focus(); } catch (_) {} }
});

// ── Respond to a freshly opened display asking for state ─────────────────────
bus.on(msg => {
  if (!msg) return;
  if (msg.type === 'hello') {
    emit();
    const logo = ET.Logo.get();
    if (logo) bus.post({ type: 'logo', dataUrl: logo, logoVer });
  }
});

// ── Service worker (PWA offline) ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────────────────────
restoreSettings();
renderPresets();
const existingLogo = ET.Logo.get();
if (existingLogo) {
  const preview = $('logoPreview');
  preview.src = existingLogo;
  preview.style.display = 'block';
  $('logoFilename').style.display = 'block';
  $('logoFilename').textContent = 'Imagen cargada ✓';
}
emit();
</script>
</body>
</html>
